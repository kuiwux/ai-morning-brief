# =============================================================================
# Parro — Nginx 反向代理配置模板
# 适用于: Ubuntu/Debian (放置于 /etc/nginx/sites-available/parro)
#
# 使用说明:
#   1. 替换 parro.yourdomain.com 为你的实际域名
#   2. 启用站点: ln -s /etc/nginx/sites-available/parro /etc/nginx/sites-enabled/
#   3. 测试配置: nginx -t
#   4. 重载:     nginx -s reload
#
# Let's Encrypt HTTPS:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d parro.yourdomain.com
# =============================================================================

# ── HTTP → HTTPS 重定向（初始阶段可先只用 HTTP）──
server {
    listen 80;
    listen [::]:80;
    server_name parro.yourdomain.com;

    # Let's Encrypt ACME 挑战
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS（启用 HTTPS 后取消注释）
    # return 301 https://$host$request_uri;

    # 临时：所有请求直接代理到后端（开发/测试阶段）
    location / {
        proxy_pass http://127.0.0.1:8899;
        include /etc/nginx/conf.d/parro_proxy_params.conf;
    }
}

