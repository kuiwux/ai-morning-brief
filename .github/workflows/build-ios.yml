name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method'
        required: true
        type: choice
        options:
          - app-store
          - ad-hoc
          - development
        default: 'ad-hoc'

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_P22XMUK9Q6.p8
          chmod 600 ~/private_keys/AuthKey_P22XMUK9Q6.p8

      - name: Build and Archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -project Parro.xcodeproj \
            -scheme Parro \
            -configuration Release \
            -archivePath ./build/Parro.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_P22XMUK9Q6.p8 \
            -authenticationKeyID P22XMUK9Q6 \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}

      - name: Determine Export Method
        id: export_method
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "method=${{ inputs.export_method }}" >> $GITHUB_OUTPUT
          else
            echo "method=ad-hoc" >> $GITHUB_OUTPUT
          fi

      - name: Export IPA
        working-directory: ios
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ steps.export_method.outputs.method }}</string>
            <key>teamID</key>
            <string>W7BY6T84ZX</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Parro.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ./build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_P22XMUK9Q6.p8 \
            -authenticationKeyID P22XMUK9Q6 \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Parro-${{ steps.export_method.outputs.method }}
          path: ios/build/Parro.ipa
          retention-days: 7
