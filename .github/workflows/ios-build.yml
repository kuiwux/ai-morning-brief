name: Build & Upload iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. 2)'
        required: false
        default: ''

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Xcode path
        run: echo "XCODE_PATH=$(xcode-select -p)" && xcodebuild -version

      - name: Decode App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_P22XMUK9Q6.p8
          chmod 600 ~/private_keys/AuthKey_P22XMUK9Q6.p8

      - name: Build & Archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -project Parro.xcodeproj \
            -scheme Parro \
            -configuration Release \
            -archivePath ./build/Parro.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_P22XMUK9Q6.p8 \
            -authenticationKeyID P22XMUK9Q6 \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/Parro.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_P22XMUK9Q6.p8 \
            -authenticationKeyID P22XMUK9Q6 \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            -f ios/build/Parro.ipa \
            -t ios \
            --apiKey P22XMUK9Q6 \
            --apiIssuer ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Parro.ipa
          path: ios/build/Parro.ipa
          retention-days: 30
