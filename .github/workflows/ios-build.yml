name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'
      - 'push-notification.js'
      - 'icons/**'
      - 'capacitor.config.json'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'PWA server URL'
        required: false
        default: 'http://localhost:8899'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Override server URL
        run: |
          echo "Server URL: $SERVER_URL"
          if [ -n "$SERVER_URL" ]; then
            sed -i '' "s|http://localhost:8899|$SERVER_URL|g" capacitor.config.json
          fi
          cat capacitor.config.json
        env:
          SERVER_URL: ${{ github.event.inputs.server_url || 'http://localhost:8899' }}

      # ============ API Key 认证 ============
      # 需要在 GitHub Secrets 中设置:
      #   - APPSTORE_CONNECT_API_KEY: p8 私钥内容（多行）
      #   - APPSTORE_CONNECT_KEY_ID: Key ID
      #   - APPSTORE_CONNECT_ISSUER_ID: Issuer ID
      #   - APPLE_TEAM_ID: Apple Developer Team ID
      - name: Setup App Store Connect API Key
        env:
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY" > ~/api_key.p8
          chmod 600 ~/api_key.p8
          echo "✅ API Key written to ~/api_key.p8"

      - name: Build Capacitor web assets
        run: |
          # 创建 www 目录并复制 web 资源供 Capacitor 使用
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true
          cp *.html www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp -r icons www/ 2>/dev/null || true
          cp -r splash www/ 2>/dev/null || true

          # 检查并初始化 iOS 平台
          echo "=== Capacitor check ==="
          ls node_modules/.bin/cap && echo "cap binary found" || echo "cap NOT found"
          ls node_modules/@capacitor/cli && echo "@capacitor/cli found" || echo "@capacitor/cli NOT found"
          
          echo "=== Add iOS platform ==="
          npx @capacitor/cli add ios 2>&1
          
          echo "=== Sync ==="
          npx @capacitor/cli sync ios 2>&1
          
          echo "=== ios/ contents ==="
          ls -la ios/ 2>/dev/null || echo "ios/ not created" 

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p ios
          cat > ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>__APPLE_TEAM_ID__</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/g" ios/ExportOptions.plist

      - name: Archive & Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios/App

          echo "🔐 Using API Key authentication"
          echo "   Team ID: $APPLE_TEAM_ID"
          echo "   Key ID: $APPSTORE_CONNECT_KEY_ID"

          # Archive
          echo "📦 Archiving..."
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            archive \
            -authenticationKeyPath ~/api_key.p8 \
            -authenticationKeyID "$APPSTORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

          # Export IPA
          echo "📤 Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            -exportPath "${{ github.workspace }}/build/ipa" \
            -exportOptionsPlist "${{ github.workspace }}/ios/ExportOptions.plist" \
            -authenticationKeyPath ~/api_key.p8 \
            -authenticationKeyID "$APPSTORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_CONNECT_ISSUER_ID"

          echo "✅ Build complete!"
          ls -la "${{ github.workspace }}/build/ipa/"

      # ============ 上传到 App Store Connect ============
      - name: Upload IPA to App Store Connect
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "${{ github.workspace }}/build/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload"
            exit 1
          fi
          echo "📤 Uploading IPA to App Store Connect..."
          echo "   File: $IPA_PATH"

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"

          echo "✅ IPA uploaded to App Store Connect!"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ipa/*.ipa
          retention-days: 7
