name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'PWA server URL'
        required: false
        default: 'http://localhost:8899'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Override server URL
        if: ${{ github.event.inputs.server_url != '' }}
        run: |
          echo "Server URL: $SERVER_URL"
          sed -i '' "s|http://localhost:8899|$SERVER_URL|g" ios/Parro/ViewController.swift
          cat ios/Parro/ViewController.swift
        env:
          SERVER_URL: ${{ github.event.inputs.server_url }}

      # ============ API Key 认证 ============
      # 需要在 GitHub Secrets 中设置:
      #   - APPSTORE_CONNECT_API_KEY: p8 私钥内容（多行）
      #   - APPSTORE_CONNECT_KEY_ID: Key ID
      #   - APPSTORE_CONNECT_ISSUER_ID: Issuer ID
      #   - APPLE_TEAM_ID: Apple Developer Team ID
      - name: Setup App Store Connect API Key
        env:
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY" > ~/api_key.p8
          chmod 600 ~/api_key.p8
          echo "✅ API Key written to ~/api_key.p8"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Verify ExportOptions.plist
        run: |
          echo "=== ExportOptions.plist ==="
          cat ios/ExportOptions.plist
          plutil -lint ios/ExportOptions.plist

      - name: Archive & Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios

          echo "🔐 Using API Key authentication"
          echo "   Team ID: $APPLE_TEAM_ID"
          echo "   Key ID: $APPSTORE_CONNECT_KEY_ID"

          # Archive
          echo "📦 Archiving..."
          xcodebuild \
            -project Parro.xcodeproj \
            -scheme Parro \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/Parro.xcarchive" \
            archive \
            -authenticationKeyPath ~/api_key.p8 \
            -authenticationKeyID "$APPSTORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

          # Export IPA
          echo "📤 Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath "${{ github.workspace }}/build/Parro.xcarchive" \
            -exportPath "${{ github.workspace }}/build/ipa" \
            -exportOptionsPlist "${{ github.workspace }}/ios/ExportOptions.plist" \
            -authenticationKeyPath ~/api_key.p8 \
            -authenticationKeyID "$APPSTORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_CONNECT_ISSUER_ID"

          echo "✅ Build complete!"
          ls -la "${{ github.workspace }}/build/ipa/"

      # ============ 上传到 App Store Connect ============
      - name: Upload IPA to App Store Connect
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "${{ github.workspace }}/build/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found to upload"
            exit 1
          fi
          echo "📤 Uploading IPA to App Store Connect..."
          echo "   File: $IPA_PATH"

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"

          echo "✅ IPA uploaded to App Store Connect!"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ipa/*.ipa
          retention-days: 7
