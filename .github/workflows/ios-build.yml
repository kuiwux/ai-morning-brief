name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'
      - 'push-notification.js'
      - 'icons/**'
      - 'capacitor.config.json'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'PWA server URL'
        required: false
        default: 'http://192.168.1.133:8899'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Override server URL (if manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
          cfg.server.url = '${{ github.event.inputs.server_url }}';
          fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Build Capacitor web assets
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Generate ExportOptions.plist
        run: |
          mkdir -p ios
          cat > ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild \
            -exportArchive \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            -exportPath "${{ github.workspace }}/build/ipa" \
            -exportOptionsPlist "${{ github.workspace }}/ios/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ipa/*.ipa
          retention-days: 7
